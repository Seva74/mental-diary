<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-label="Deployment diagram for Mental Diary">
  <defs>
    <style>
      .box { fill: #f8fafc; stroke: #1f2937; stroke-width: 2; rx: 14; ry: 14; }
      .title { font: 700 22px Arial, sans-serif; fill: #111827; }
      .label { font: 600 18px Arial, sans-serif; fill: #111827; }
      .small { font: 14px Arial, sans-serif; fill: #374151; }
      .line { stroke: #374151; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 8 7; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#374151"/>
    </marker>
  </defs>

  <text x="40" y="42" class="title">Deployment view of Mental Diary</text>

  <rect x="40" y="90" width="170" height="110" class="box"/>
  <text x="65" y="130" class="label">User device</text>
  <text x="65" y="155" class="small">Browser / mobile web</text>
  <text x="65" y="178" class="small">UI access point</text>

  <rect x="280" y="80" width="200" height="130" class="box"/>
  <text x="310" y="125" class="label">Web frontend</text>
  <text x="310" y="150" class="small">React app</text>
  <text x="310" y="173" class="small">Static assets + UI</text>

  <rect x="540" y="80" width="220" height="130" class="box"/>
  <text x="570" y="125" class="label">Application API</text>
  <text x="570" y="150" class="small">Node.js / backend</text>
  <text x="570" y="173" class="small">Business logic</text>

  <rect x="850" y="55" width="120" height="85" class="box"/>
  <text x="870" y="95" class="label">Database</text>
  <text x="872" y="118" class="small">PostgreSQL</text>

  <rect x="850" y="165" width="120" height="85" class="box"/>
  <text x="875" y="205" class="label">AI API</text>
  <text x="862" y="228" class="small">External service</text>

  <rect x="850" y="275" width="120" height="85" class="box"/>
  <text x="857" y="315" class="label">Specialist API</text>
  <text x="862" y="338" class="small">External service</text>

  <rect x="1035" y="165" width="125" height="85" class="box"/>
  <text x="1050" y="205" class="label">Files/Logs</text>
  <text x="1047" y="228" class="small">Artifacts</text>

  <path d="M 210 145 L 280 145" class="line"/>
  <path d="M 480 145 L 540 145" class="line"/>
  <path d="M 760 132 L 850 97" class="line"/>
  <path d="M 760 150 L 850 205" class="line"/>
  <path d="M 760 168 L 850 317" class="line"/>
  <path d="M 760 184 L 1035 205" class="line dashed"/>

  <text x="500" y="250" class="small">HTTPS / REST API</text>
  <text x="885" y="52" class="small">Persistent data</text>
  <text x="880" y="162" class="small">Fallback / advice</text>
</svg>
