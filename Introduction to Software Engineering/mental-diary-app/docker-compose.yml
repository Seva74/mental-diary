services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mental_diary
      POSTGRES_USER: mental_diary
      POSTGRES_PASSWORD: mental_diary
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mental_diary -d mental_diary"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ./apps/api
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://mental_diary:mental_diary@db:5432/mental_diary
      AI_PROVIDER: fallback
      FRONTEND_ORIGIN: http://localhost:8080
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
      args:
        VITE_API_BASE_URL: http://localhost:3001/api
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  db_data: