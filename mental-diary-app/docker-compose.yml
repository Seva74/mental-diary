services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mental_diary
      POSTGRES_USER: mental_diary
      POSTGRES_PASSWORD: mental_diary
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mental_diary -d mental_diary"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://mental_diary:mental_diary@db:5432/mental_diary
      AI_PROVIDER: fallback
      ML_PROVIDER: python
      ML_SERVICE_URL: http://ml:8000
      FRONTEND_ORIGIN: http://localhost:8080
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
      ml:
        condition: service_started

  ml:
    build:
      context: .
      dockerfile: services/ml/Dockerfile
    ports:
      - "8000:8000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  db_data:
